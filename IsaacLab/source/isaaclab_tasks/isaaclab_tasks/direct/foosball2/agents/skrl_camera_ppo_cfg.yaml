seed: 42

# Asymmetric actor-critic for vision-based foosball:
#   policy (actor) sees stacked overhead RGB frames (HWC, 128 x 128 x 9, uint8)
#   value (critic) sees the privileged 41-dim state vector
#
# IsaacLab's skrl wrapper passes the dict observation to the policy under STATES
# and the privileged state-space tensor to the value model. Set `separate: True`
# so each model has its own encoder.
models:
  separate: True
  policy:  # GaussianMixin: stochastic actor over 8 continuous actions
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: features_extractor
        # Cast uint8 -> float32, scale to [0, 1], then permute NHWC -> NCHW.
        # (don't permute for JAX; keep this PyTorch-only)
        input: permute(STATES.float() / 255.0, (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 4, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
        activations: relu
      - name: net
        input: features_extractor
        layers: [512]
        activations: elu
    output: ACTIONS
  value:  # DeterministicMixin: critic over privileged 41-dim state
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [256, 256]
        activations: elu
    output: ONE


# Rollout memory
memory:
  class: RandomMemory
  memory_size: -1  # auto = agent:rollouts


# PPO agent (field names from PPO_DEFAULT_CONFIG)
agent:
  class: PPO
  rollouts: 32
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  state_preprocessor: null  # actor sees uint8 pixels; value preproc handles state
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.005
  value_loss_scale: 0.5
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: False
  experiment:
    directory: "foosball_vision_skrl"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


trainer:
  class: SequentialTrainer
  timesteps: 4000000
  environment_info: log
