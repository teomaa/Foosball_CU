seed: 42

# Asymmetric actor-critic for vision-based foosball.
#
# STATES layout (flat, 147497 dims):
#   [0 .. 147455]  = stacked RGB image (128*128*9), float32 values 0-255
#   [147456 .. 147496] = privileged 41-dim state (joint pos/vel, ball pos/vel)
#
# The policy CNN slices out the image portion, reshapes to NHWC, permutes to
# NCHW, and scales to [0, 1].  The value MLP slices out the 41-dim state.
models:
  separate: True
  policy:  # GaussianMixin: stochastic actor over 8 continuous actions
    class: GaussianMixin
    # Clip sampled actions to action-space bounds BEFORE they're stored in the
    # rollout. With clip_actions=False, PPO's log_prob is computed on raw
    # pre-clamp Gaussian samples, so the policy mean can drift past ±1 "for
    # free" (env clamps to ±1 anyway) — this is what caused the rod-flip
    # degenerate behavior in skrl but not in sb3.
    clip_actions: True
    clip_log_std: True
    min_log_std: -1.0
    max_log_std: 2.0
    initial_log_std: -0.5
    network:
      - name: features_extractor
        input: permute(STATES[:, :147456].reshape(-1, 128, 128, 9) / 255.0, (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 4, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
        activations: relu
      - name: net
        input: features_extractor
        layers: [512]
        activations: elu
    output: ACTIONS
  value:  # DeterministicMixin: critic over privileged 41-dim state
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        # Divide by 20 (matches env clamp) so state is ~[-1, 1] before the MLP.
        # Prevents large activations from 41-dim state values that the skrl
        # state_preprocessor can't normalize (it's null because the 147k image
        # part can't go through RunningStandardScaler).
        input: STATES[:, 147456:] / 20.0
        layers: [256, 256]
        activations: elu
    output: ONE


# Rollout memory
memory:
  class: RandomMemory
  memory_size: -1  # auto = agent:rollouts


# PPO agent (field names from PPO_DEFAULT_CONFIG)
agent:
  class: PPO
  rollouts: 32
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  state_preprocessor: null
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.03
  value_loss_scale: 0.5
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: False
  experiment:
    directory: "foosball_vision_skrl"
    experiment_name: ""
    write_interval: 200
    checkpoint_interval: 5000  # ~every 5k steps — tighter than 'auto' so a crash after many hours doesn't lose a full run


trainer:
  class: SequentialTrainer
  timesteps: 4000000
  environment_info: log
