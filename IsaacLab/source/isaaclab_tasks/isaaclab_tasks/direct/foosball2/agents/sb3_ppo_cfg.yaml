# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
seed: 42

n_timesteps: !!float 3e6
policy: 'MlpPolicy'
n_steps: 256
batch_size: 4096
gae_lambda: 0.95
gamma: 0.97
n_epochs: 200
ent_coef: 0.1
learning_rate: lin_3e-4
clip_range: !!float 0.2
policy_kwargs:
  activation_fn: nn.ReLU
  net_arch: [512, 512, 256]
  squash_output: False
vf_coef: 0.8
max_grad_norm: 0.5
device: "cpu"
